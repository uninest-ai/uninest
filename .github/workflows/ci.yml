name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # migrated from pip + Python 3.11 to uv + Python 3.13 (the "sweeping CI change")
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (uv)
        run: uv sync   # installs project + dev group (ruff, mypy) from uv.lock

      # Scoped to ai_gateway_demo for now. Expand to the whole backend once the full
      # requirements (torch/sentence-transformers etc.) are migrated onto uv.
      - name: Lint (ruff)
        run: uv run ruff check ai_gateway_demo

      - name: Type check (mypy)
        run: uv run mypy ai_gateway_demo

      - name: Test (pytest)
        run: uv run pytest ai_gateway_demo -v
